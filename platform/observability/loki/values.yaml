deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: filesystem
  pattern_ingester:
    enabled: true
  limits_config:
    allow_structured_metadata: true
    volume_enabled: true
    retention_period: 336h        # 14 days — default fallback
    retention_stream:
      - selector: '{namespace=~"kube-system|argocd|observability"}'
        priority: 1
        period: 72h               # 3 days — infra/platform noise
      - selector: '{namespace=~"llmgw|homecal|homenews"}'
        priority: 2
        period: 720h              # 30 days — real apps (rules dormant until namespaces exist)
  compactor:
    retention_enabled: true
    delete_request_store: filesystem

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 20Gi
    storageClass: local-path

# Disable scalable-mode components
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# Disable extras not needed on a single node
chunksCache:
  enabled: false
resultsCache:
  enabled: false
test:
  enabled: false
lokiCanary:
  enabled: false
monitoring:
  selfMonitoring:
    enabled: false
  lokiCanary:
    enabled: false
minio:
  enabled: false
gateway:
  enabled: false
