apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homework
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/autumnfallenwang/homework.git
    targetRevision: main
    path: deploy/chart
    helm:
      releaseName: homework
      valueFiles:
        - values.yaml
      # The GHA workflow (bump-arch-infra job) rewrites BOTH api.image.tag and
      # web.image.tag to the same commit SHA on every successful main build, so
      # ArgoCD rolls api + web together. "latest" until the first build pushes
      # SHA-tagged images — expect a brief ImagePullBackOff on the very first
      # sync until the GHCR packages exist (and are made public).
      parameters:
        - name: api.image.tag
          value: "323cbf8bfad8ed0ec288a767315f975341d6d09d"
        - name: web.image.tag
          value: "323cbf8bfad8ed0ec288a767315f975341d6d09d"
        # Stays disabled until homework-secrets is created in-cluster
        # (homework repo: scripts/create-cluster-secret.sh). Flip to "true" so
        # ArgoCD runs the Helm pre-install migrate hook on the next sync.
        - name: migrate.enabled
          value: "true"
  destination:
    server: https://kubernetes.default.svc
    namespace: homework
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
