apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homenews
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/autumnfallenwang/homenews.git
    targetRevision: main
    path: deploy/chart
    helm:
      releaseName: homenews
      valueFiles:
        - values.yaml
      # GHA workflow (.github/workflows/build.yml `bump-arch-infra` job) rewrites
      # BOTH api.image.tag and web.image.tag to the same commit SHA on every
      # successful main build — a single yq expression bumps them atomically so
      # ArgoCD rolls api + web together (the contract evolves in lockstep, esp.
      # NEXT_PUBLIC_API_URL which is baked into the web bundle at build time).
      # Initial "latest" matches the chart defaults; the GHCR packages don't
      # exist until the first build completes + Task 112 step 3 flips them
      # public, so expect ImagePullBackOff briefly on first sync.
      parameters:
        - name: api.image.tag
          value: "119d77bf414563c2bb0880b39897ecad72522d96"
        - name: web.image.tag
          value: "119d77bf414563c2bb0880b39897ecad72522d96"
  destination:
    server: https://kubernetes.default.svc
    namespace: homenews
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
